name = "spectrum-api"
main = "src/index.ts"
compatibility_date = "2026-03-12"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Custom domain is managed via Workers Custom Domains (auto-creates DNS)
# Do NOT use routes — it conflicts with Custom Domains and causes 503s

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "spectrum-db"
database_id = "9774695e-969d-4a78-87a7-61eda6d6992f"

# Secrets (set via `wrangler secret put`):
# BETTER_AUTH_SECRET - Secret for signing auth tokens
