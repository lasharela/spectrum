openapi: 3.1.0
info:
  title: Spectrum Dashboard API
  version: 1.0.0

paths:
  /api/dashboard:
    get:
      summary: Get home dashboard data
      description: Returns greeting, recent posts, promotions, places, and events for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      name:
                        type: string
                      userType:
                        type: string
                  recentPosts:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        content:
                          type: string
                        authorName:
                          type: string
                        likesCount:
                          type: integer
                        commentsCount:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time
                  promotions:
                    type: array
                    items:
                      type: object
                  places:
                    type: array
                    items:
                      type: object
                  upcomingEvents:
                    type: array
                    items:
                      type: object
                  stats:
                    type: object
                    properties:
                      postsCount:
                        type: integer
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
