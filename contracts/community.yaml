openapi: 3.1.0
info:
  title: Spectrum Community API
  version: 1.0.0
  description: Community feed endpoints

paths:
  /api/posts:
    get:
      summary: List posts (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        "200":
          description: Paginated posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Post"
                  nextCursor:
                    type: string
                    nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      summary: Create a post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 5000
                tags:
                  type: array
                  items:
                    type: string
                    maxLength: 30
                  maxItems: 5
                  default: []
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                type: object
                properties:
                  post:
                    $ref: "#/components/schemas/Post"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/posts/{id}:
    get:
      summary: Get a single post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post details
          content:
            application/json:
              schema:
                type: object
                properties:
                  post:
                    $ref: "#/components/schemas/Post"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Delete own post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/posts/{id}/comments:
    get:
      summary: List comments on a post (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        "200":
          description: Paginated comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
                  nextCursor:
                    type: string
                    nullable: true

    post:
      summary: Add a comment to a post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 2000
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  comment:
                    $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/posts/{id}/comments/{commentId}:
    delete:
      summary: Delete own comment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comment deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/posts/{id}/reactions:
    put:
      summary: Like a post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post liked
          content:
            application/json:
              schema:
                type: object
                properties:
                  liked:
                    type: boolean
                    enum: [true]
                  likesCount:
                    type: integer

    delete:
      summary: Unlike a post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post unliked
          content:
            application/json:
              schema:
                type: object
                properties:
                  liked:
                    type: boolean
                    enum: [false]
                  likesCount:
                    type: integer

  /api/health:
    get:
      summary: Health check
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    Post:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        authorId:
          type: string
        author:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            image:
              type: string
              nullable: true
            userType:
              type: string
        createdAt:
          type: string
          format: date-time
        likesCount:
          type: integer
        commentsCount:
          type: integer
        liked:
          type: boolean
          description: Whether the current user has liked this post

    Comment:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        authorId:
          type: string
        author:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            image:
              type: string
              nullable: true
        postId:
          type: string
        createdAt:
          type: string
          format: date-time

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: string
                enum: [UNAUTHORIZED]

    Forbidden:
      description: Not authorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: string
                enum: [FORBIDDEN]

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: string
                enum: [NOT_FOUND]

    ValidationError:
      description: Invalid input
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: string
                enum: [VALIDATION_ERROR]
